name: Deploy to GitHub Pages

on:
  # 當推送到 main 或 master 分支時自動觸發
  push:
    branches:
      - main
      - master
  # 允許手動觸發
  workflow_dispatch:

# 設定權限，允許這個 Action 推送程式碼到您的儲存庫分支
permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build project
        # 這裡會觸發 vite.config.ts，並自動抓取 GITHUB_REPOSITORY 環境變數來設定正確的 base path
        run: npm run build

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          force_orphan: true # 讓 gh-pages 分支保持乾淨，只保留編譯後的靜態檔案
